<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>柜面培训模拟系统 - 登录</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-body">
<div class="login-shell">
    <div class="brand-panel">
        <div class="brand-logo">山东农村商业银行</div>
        <div class="brand-sub">Counter Training Simulation</div>
        <ul class="brand-list">
            <li>Spring Boot + Thymeleaf 单体架构</li>
            <li>MySQL + MyBatis-Plus 持久化</li>
            <li>柜员 01-20 快速登录</li>
        </ul>
    </div>
    <div class="login-panel">
        <h1>柜员登录</h1>
        <p class="fingerprint-tip">账户：柜员编号　密码：指纹（模拟）</p>
        <form th:action="@{/login}" method="post" th:object="${loginForm}">
            <label>柜员</label>
            <select th:field="*{tellerCode}">
                <option value="">请选择柜员</option>
                <option th:each="item : ${tellers}" th:value="${item.tellerCode}" th:text="${item.tellerName}"></option>
            </select>
            <div class="error" th:if="${error}" th:text="${error}"></div>
            <button class="primary-btn" type="submit">登录</button>
        </form>
    </div>
</div>
</body>
</html>
