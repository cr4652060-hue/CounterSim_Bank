<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>客户 Excel 导入</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="simple-page">
    <div class="simple-card">
        <div class="page-title">客户 Excel 导入</div>
        <p>按开发文档定义的任务单字段顺序导入客户主档和介质明细；未上传文件时，默认读取系统配置路径中的 Excel。</p>
        <p>默认导入路径：<code th:text="${defaultImportPath}"></code></p>
        <form th:action="@{/import/customers}" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept=".xlsx,.xls">
            <button class="primary-btn" type="submit">开始导入</button>
            <a class="ghost-btn" th:href="@{/dashboard}">返回首页</a>
        </form>
        <div class="success" th:if="${message}" th:text="${message}"></div>
        <div class="error" th:if="${error}" th:text="${error}"></div>
    </div>
</div>
</body>
</html>
