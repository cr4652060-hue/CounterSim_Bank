<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>柜员主界面</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <header class="top-bar">
        <div class="logo">山东农村商业银行</div>
        <nav class="top-nav">
            <span>任务中心</span>
            <span>消息中心</span>
            <span>帮助中心</span>
            <span>工具中心</span>
            <span>其他系统</span>
        </nav>
        <div class="trade-search">交易码</div>
        <div class="avatar-menu">
            <div class="avatar-circle" th:text="${teller.tellerCode}"></div>
            <form th:action="@{/logout}" method="post"><button type="submit">退出</button></form>
        </div>
    </header>
    <div class="main-grid">
        <aside class="left-panel">
            <section class="status-card">
                <h3>柜员状态</h3>
                <div>柜员：<span th:text="${teller.tellerName}"></span></div>
                <div>现金：<span th:text="${#numbers.formatDecimal(teller.currentCash, 1, 'COMMA', 2, 'POINT')}"></span></div>
                <div>授权阈值：<span th:text="${teller.authThreshold}"></span></div>
                <div>超库阈值：<span th:text="${teller.overflowThreshold}"></span></div>
            </section>
            <section class="status-card">
                <h3>客户概要信息</h3>
                <div th:if="${counterCustomer == null}">当前无临柜客户。</div>
                <div th:if="${counterCustomer != null}">
                    <div>姓名：<span th:text="${counterCustomer.customerName}"></span></div>
                    <div>手机：<span th:text="${counterCustomer.mobile}"></span></div>
                    <div>介质数：<span th:text="${counterCustomer.mediumCount}"></span></div>
                </div>
            </section>
            <section class="status-card">
                <h3>快捷入口</h3>
                <a class="secondary-btn block" th:href="@{/inventory/0055}">0055 柜员库箱查询</a>
                <a class="secondary-btn block" th:href="@{/import/customers}">客户 Excel 导入</a>
            </section>
        </aside>
        <main class="content-panel">
            <section class="workspace-card">
                <div class="workspace-header">常用交易</div>
                <div class="workspace-body">
                    <div class="placeholder-grid">
                        <div class="placeholder-item">1061 个人活期存款续存（预留）</div>
                        <div class="placeholder-item">1062 个人活期存款现金支取（预留）</div>
                        <div class="placeholder-item">1651 个人定期存款开户（预留）</div>
                        <div class="placeholder-item">1657 个人定期存款支取（预留）</div>
                        <div class="placeholder-item">3900 联网核查（预留）</div>
                        <div class="placeholder-item">公共弹窗中心（预留）</div>
                    </div>
                </div>
            </section>
        </main>
        <aside class="right-panel">
            <section class="status-card warning-box">
                <h3>客户到达</h3>
                <div th:if="${counterCustomer == null}">
                    <p>当前无客户</p>
                    <form th:action="@{/counter-customer/arrive}" method="post">
                        <button class="primary-btn block" type="submit">客户到达</button>
                    </form>
                </div>
                <div th:if="${counterCustomer != null}">
                    <p><strong th:text="${counterCustomer.customerName}"></strong></p>
                    <p>介质数量：<span th:text="${counterCustomer.mediumCount}"></span></p>
                    <p>账户类型：<span th:text="${counterCustomer.accountTypeCount}"></span></p>
                    <ul class="media-list">
                        <li th:each="media : ${counterCustomer.mediaLabels}" th:text="${media}"></li>
                    </ul>
                    <button class="secondary-btn block" type="button">开始办理</button>
                    <form th:action="@{/counter-customer/switch}" method="post">
                        <button class="primary-btn block" type="submit">更换客户</button>
                    </form>
                    <form th:action="@{/counter-customer/clear}" method="post">
                        <button class="ghost-btn block" type="submit">清空客户</button>
                    </form>
                </div>
            </section>
        </aside>
    </div>
</div>
</body>
</html>
