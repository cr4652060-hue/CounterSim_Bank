<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>柜员主界面</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell desk-shell">
    <header class="top-frame-bar">
        <div class="frame-caption">柜面服务平台</div>
        <div class="frame-actions">— □ ×</div>
    </header>

    <header class="top-bar desk-top-bar">
        <div class="brand-lockup brand-lockup-bank">
            <img class="brand-logo-image" th:src="@{/images/logo.png}" src="/images/logo.png" alt="山东农商银行标志">
        </div>
        <nav class="top-nav top-nav-bank">
            <span>任务中心</span>
            <span>消息中心</span>
            <span>帮助中心</span>
            <span>工具中心</span>
            <span>其他系统</span>
        </nav>
        <div class="top-utility-area">
            <div class="trade-search-box bank-search-box" id="trade-search-box">
                <input id="trade-search-input" type="text" autocomplete="off" placeholder="交易码">
                <div class="trade-search-results hidden" id="trade-search-results"></div>
            </div>
            <div class="top-utility-icons">
                <span class="utility-icon">🔒</span>
            </div>
            <div class="avatar-menu teller-menu bank-teller-menu">
                <div class="teller-identity">
                    <div class="teller-code" th:text="${teller.tellerCode}"></div>
                    <div class="teller-name" th:text="${teller.tellerName}"></div>
                </div>
                <form th:action="@{/logout}" method="post" class="top-exit-form">
                    <button type="submit" class="avatar-circle avatar-circle-lite">退</button>
                </form>
            </div>
        </div>
    </header>

    <div class="desk-layout bank-layout">
        <aside class="desk-sidebar bank-sidebar">
            <section class="sidebar-panel queue-panel">
                <div class="queue-panel-main">
                    <div class="queue-metrics">
                        <div><span>排队号:</span><strong>--</strong></div>
                        <div><span>等待人数:</span><strong>3</strong></div>
                        <div><span>窗口号:</span><strong th:text="${teller.tellerCode}"></strong></div>
                        <div><span>状态:</span><strong>未签到</strong></div>
                    </div>
                    <div class="queue-primary-actions">
                        <button type="button" class="counter-mini-btn wide">签到</button>
                        <button type="button" class="counter-mini-btn wide">暂停</button>
                        <button type="button" class="counter-mini-btn wide">评价</button>
                    </div>
                </div>
                <div class="queue-side-actions">
                    <button type="button" class="counter-mini-btn">顺呼</button>
                    <button type="button" class="counter-mini-btn">重呼</button>
                    <button type="button" class="counter-mini-btn compact-side-btn">呼叫大堂</button>
                    <button type="button" class="counter-mini-btn compact-side-btn">呼叫主管</button>
                </div>
            </section>

            <section class="sidebar-panel info-panel">
                <div class="panel-caption">客户信息区</div>
                <div class="panel-empty-body"></div>
            </section>

            <section class="sidebar-panel info-panel filler-panel">
                <div class="panel-caption">其他信息</div>
                <div class="panel-empty-body"></div>
            </section>
        </aside>

        <main class="desk-workspace bank-workspace">
            <section class="desk-tabs-section bank-workspace-shell">
                <div class="trade-tab-strip bank-tab-strip" id="trade-tab-strip"></div>
                <div class="trade-stage bank-trade-stage" id="trade-stage"></div>
            </section>
        </main>
    </div>

    <footer class="desk-status-bar">
        <div>日期: 2026-03-22</div>
        <div>库箱号: 106</div>
        <div th:text="|柜员号: ${teller.tellerCode}|"></div>
    </footer>
</div>

<div class="floating-customer-card bank-customer-card" id="floating-customer-card">
    <div class="floating-card-header bank-customer-header" id="floating-card-header">
        <div class="floating-card-heading">
            <div class="floating-card-title" id="floating-card-title">客户提示</div>
            <div class="floating-card-status" id="floating-card-status">当前无客户</div>
        </div>
        <button type="button" class="card-min-btn" id="customer-card-toggle" aria-label="最小化客户提示">—</button>
    </div>
    <div class="floating-card-body" id="floating-card-body"></div>
</div>

<script th:inline="javascript">
    window.dashboardBootstrap = {
        teller: /*[[${teller}]]*/ {},
        counterCustomerState: /*[[${counterCustomerState}]]*/ {}
    };
</script>
<script>
    (() => {
        const TRADE_DEFINITIONS = [
            { code: '0055', name: '柜员库箱查询', keywords: ['0055', '库箱', '柜员库箱', '库存', '凭证'], kind: 'iframe', src: '/inventory/0055?embedded=true' },
            { code: '3900', name: '联网核查', keywords: ['3900', '联网核查', '核查'], kind: 'form', theme: '联网核查' },
            { code: '1061', name: '个人活期存款续存', keywords: ['1061', '续存', '活期', '存款'], kind: 'form', theme: '个人活期存款续存' },
            { code: '1062', name: '个人活期存款现金支取', keywords: ['1062', '支取', '取款', '活期'], kind: 'form', theme: '个人活期存款现金支取' },
            { code: '1651', name: '个人定期存款开户', keywords: ['1651', '定期开户', '存单开户'], kind: 'form', theme: '个人定期存款开户' },
            { code: '1657', name: '个人定期存款支取', keywords: ['1657', '定期支取', '存单支取'], kind: 'form', theme: '个人定期存款支取' }
        ];

        const STORAGE_KEYS = {
            tabs: 'dashboard-open-tabs',
            activeTab: 'dashboard-active-tab',
            cardPosition: 'dashboard-customer-card-position',
            cardCollapsed: 'dashboard-customer-card-collapsed'
        };

        const bootstrap = window.dashboardBootstrap || {};
        const state = {
            teller: bootstrap.teller || {},
            customerState: normalizeCustomerState(bootstrap.counterCustomerState),
            tabs: [],
            activeTabId: null
        };

        const searchBox = document.getElementById('trade-search-box');
        const searchInput = document.getElementById('trade-search-input');
        const searchResults = document.getElementById('trade-search-results');
        const tabStrip = document.getElementById('trade-tab-strip');
        const tradeStage = document.getElementById('trade-stage');
        const floatingCard = document.getElementById('floating-customer-card');
        const floatingCardBody = document.getElementById('floating-card-body');
        const floatingCardTitle = document.getElementById('floating-card-title');
        const floatingCardStatus = document.getElementById('floating-card-status');
        const cardToggle = document.getElementById('customer-card-toggle');
        const cardHeader = document.getElementById('floating-card-header');

        hydrateTabs();
        restoreCardPosition();
        bindSearch();
        bindCardDrag();
        renderTabs();
        renderCustomerCard();
        applyCardCollapsedState();

        function normalizeCustomerState(raw) {
            if (!raw || !raw.serviceStatus) {
                return { serviceStatus: 'NONE', customer: null, intent: null };
            }
            return raw;
        }

        function hydrateTabs() {
            const storedTabs = safeJsonParse(sessionStorage.getItem(STORAGE_KEYS.tabs), []);
            const storedActiveTab = sessionStorage.getItem(STORAGE_KEYS.activeTab);
            state.tabs = storedTabs
                .map(item => {
                    const definition = getTradeDefinition(item.code);
                    return definition ? { ...definition, id: item.id || item.code } : null;
                })
                .filter(Boolean);
            state.activeTabId = state.tabs.some(tab => tab.id === storedActiveTab)
                ? storedActiveTab
                : state.tabs[0]?.id || null;
        }

        function persistTabs() {
            sessionStorage.setItem(STORAGE_KEYS.tabs, JSON.stringify(state.tabs.map(tab => ({ id: tab.id, code: tab.code }))));
            if (state.activeTabId) {
                sessionStorage.setItem(STORAGE_KEYS.activeTab, state.activeTabId);
            } else {
                sessionStorage.removeItem(STORAGE_KEYS.activeTab);
            }
        }

        function getTradeDefinition(code) {
            return TRADE_DEFINITIONS.find(item => item.code === code);
        }

        function bindSearch() {
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim()) {
                    renderSearchResults(searchInput.value.trim());
                }
            });
            searchInput.addEventListener('input', () => {
                const keyword = searchInput.value.trim();
                if (!keyword) {
                    searchResults.classList.add('hidden');
                    searchResults.innerHTML = '';
                    return;
                }
                renderSearchResults(keyword);
            });
            searchInput.addEventListener('keydown', event => {
                if (event.key !== 'Enter') {
                    return;
                }
                event.preventDefault();
                const keyword = searchInput.value.trim();
                if (!keyword) {
                    return;
                }
                const exact = TRADE_DEFINITIONS.find(item => item.code === keyword);
                const firstMatch = exact || findMatches(keyword)[0];
                if (firstMatch) {
                    openTrade(firstMatch.code);
                    searchInput.value = '';
                    searchResults.classList.add('hidden');
                }
            });
            document.addEventListener('click', event => {
                if (!searchBox.contains(event.target)) {
                    searchResults.classList.add('hidden');
                }
            });
        }

        function findMatches(keyword) {
            const normalized = keyword.toLowerCase();
            return TRADE_DEFINITIONS.filter(item => item.code.toLowerCase().includes(normalized)
                || item.name.toLowerCase().includes(normalized)
                || item.keywords.some(word => word.toLowerCase().includes(normalized)));
        }

        function renderSearchResults(keyword) {
            const matched = findMatches(keyword);
            if (!matched.length) {
                searchResults.innerHTML = '<div class="search-empty bank-search-empty">未找到对应交易</div>';
            } else {
                searchResults.innerHTML = matched.map(item => `
                    <button type="button" class="search-result-item bank-search-result" data-trade-code="${item.code}">
                        <span class="search-result-code">${item.code}</span>
                        <span class="search-result-name">${item.name}</span>
                    </button>
                `).join('');
                searchResults.querySelectorAll('[data-trade-code]').forEach(button => {
                    button.addEventListener('click', () => {
                        openTrade(button.dataset.tradeCode);
                        searchInput.value = '';
                        searchResults.classList.add('hidden');
                    });
                });
            }
            searchResults.classList.remove('hidden');
        }

        function openTrade(code) {
            const definition = getTradeDefinition(code);
            if (!definition) {
                return;
            }
            const existing = state.tabs.find(tab => tab.code === code);
            if (existing) {
                state.activeTabId = existing.id;
            } else {
                const tab = { ...definition, id: code };
                state.tabs.push(tab);
                state.activeTabId = tab.id;
            }
            persistTabs();
            renderTabs();
        }

        function closeTrade(tabId) {
            const index = state.tabs.findIndex(tab => tab.id === tabId);
            if (index < 0) {
                return;
            }
            const wasActive = state.activeTabId === tabId;
            state.tabs.splice(index, 1);
            if (wasActive) {
                state.activeTabId = state.tabs[index - 1]?.id || state.tabs[index]?.id || null;
            }
            persistTabs();
            renderTabs();
        }

        function renderTabs() {
            if (!state.tabs.length) {
                tabStrip.innerHTML = '<div class="tab-strip-empty bank-tab-empty"></div>';
                tradeStage.innerHTML = '<div class="workspace-blank"></div>';
                return;
            }

            tabStrip.innerHTML = state.tabs.map(tab => `
                <div class="trade-tab bank-trade-tab ${tab.id === state.activeTabId ? 'active' : ''}" data-tab-id="${tab.id}">
                    <button type="button" class="trade-tab-switch">
                        <span class="trade-tab-code">${tab.code}</span>
                        <span>${tab.name}</span>
                    </button>
                    <button type="button" class="trade-tab-close" aria-label="关闭 ${tab.name}">×</button>
                </div>
            `).join('');

            tabStrip.querySelectorAll('.trade-tab').forEach(tabNode => {
                const tabId = tabNode.dataset.tabId;
                tabNode.querySelector('.trade-tab-switch').addEventListener('click', () => {
                    state.activeTabId = tabId;
                    persistTabs();
                    renderTabs();
                });
                tabNode.querySelector('.trade-tab-close').addEventListener('click', event => {
                    event.stopPropagation();
                    closeTrade(tabId);
                });
            });

            const activeTab = state.tabs.find(tab => tab.id === state.activeTabId) || state.tabs[0];
            state.activeTabId = activeTab.id;
            persistTabs();
            tradeStage.innerHTML = renderTradeContent(activeTab);
            bindTradeStageActions(activeTab);
        }

        function renderTradeContent(tab) {
            if (tab.kind === 'iframe') {
                return `
                    <div class="trade-pane trade-pane-iframe bank-iframe-pane">
                        <iframe src="${tab.src}" title="${tab.code} ${tab.name}"></iframe>
                    </div>
                `;
            }
            return renderSimulatedTradeWindow(tab);
        }

        function renderSimulatedTradeWindow(tab) {
            const customer = state.customerState.customer;
            const loaded = customer && tab.code !== '3900';
            const body = tab.code === '1657'
                ? render1657Layout(customer, loaded)
                : renderGenericTradeLayout(tab, customer, loaded);
            return `
                <div class="trade-pane bank-trade-pane">
                    <div class="sim-counter-window">
                        <div class="sim-window-titlebar">${tab.code} - ${tab.name}</div>
                        <div class="sim-window-body">
                            ${body}
                        </div>
                    </div>
                </div>
            `;
        }

        function render1657Layout(customer, loaded) {
            return `
                <div class="trade-form-shell trade-1657-shell">
                    <div class="form-line compact-line">
                        <label>是否存折</label>
                        <select class="field-yellow"><option>0-存单</option></select>
                    </div>
                    <section class="trade-section-block">
                        <div class="trade-section-title">账户信息</div>
                        <div class="trade-form-grid form-grid-2col">
                            <label class="span-2">账号<input class="field-yellow" value="${loaded ? '916110000010579378500' : ''}" ${loaded ? 'readonly' : ''}></label>
                            <label>册号<input value=""></label>
                            <label>凭证印刷号<input class="field-yellow" value="${loaded ? (customer.mediaDetails?.find(item => item.mediumType === '存单')?.voucherNo || '') : ''}" ${loaded ? 'readonly' : ''}></label>
                            <label>挂失标志<input value=""></label>
                            <label>挂失登记单查询<input value=""></label>
                            <label>户名<input value="${loaded ? customer.customerName : ''}" ${loaded ? 'readonly' : ''}></label>
                            <label>支取方式<select><option></option></select></label>
                        </div>
                    </section>
                    <section class="trade-section-block">
                        <div class="trade-section-title">交易信息</div>
                        <div class="trade-form-grid form-grid-2col">
                            <label>支取类别<select class="field-yellow"><option></option></select></label>
                            <label>交易类别<select class="field-yellow"><option></option></select></label>
                            <label>币种<select><option>156 CNY 人民币</option></select></label>
                            <label>钞汇标志<select><option></option></select></label>
                            <label>未通知本金金额<input value=""></label>
                            <label>通知存款议定编号<input value=""></label>
                            <label>通知存款支取方式<select><option></option></select></label>
                            <label>密码<input value=""></label>
                            <label>支取金额<input class="field-yellow" value="${loaded ? '5000.00' : ''}"></label>
                            <label>是否到期<select><option></option></select></label>
                            <label>证件类型<select><option>${loaded ? (customer.idType || '') : ''}</option></select></label>
                            <label>证件号码<input value="${loaded ? (customer.idNo || '') : ''}"></label>
                            <label>外汇兑钞水单编号<input value=""></label>
                            <label>非义务教育证明<select><option></option></select></label>
                            <label>新凭证种类<select><option></option></select></label>
                            <label>新存单存折印刷号<input value=""></label>
                            <label>部提渠利率依正<select class="field-yellow"><option></option></select></label>
                            <label>部提渠浮动利率加减码符号<select><option></option></select></label>
                            <label>部提渠浮动利率加减码<input value=""></label>
                            <label>部提利率<input value="0.00000"></label>
                            <label>外汇系统业务参考号<input value=""></label>
                            <label>备注<input value=""></label>
                            <label>摘要<select><option></option></select></label>
                        </div>
                    </section>
                    <section class="trade-section-block">
                        <div class="trade-section-title">代理信息</div>
                        <div class="trade-form-grid form-grid-2col">
                            <label>是否代理<select class="field-yellow"><option></option></select></label>
                            <label>代理人证件类型<select><option></option></select></label>
                            <label class="span-2">代理人证件号码<input value=""></label>
                            <label>代理人名称<input value=""></label>
                            <label>代理人联系方式<input value=""></label>
                        </div>
                    </section>
                    <div class="trade-action-row bank-action-row">
                        <button type="button" class="counter-form-btn">提交</button>
                        <button type="button" class="counter-form-btn">退出</button>
                    </div>
                </div>
            `;
        }

        function renderGenericTradeLayout(tab, customer, loaded) {
            return `
                <div class="trade-form-shell generic-trade-shell">
                    <section class="trade-section-block">
                        <div class="trade-section-title">账户信息</div>
                        <div class="trade-form-grid form-grid-2col">
                            <label>客户名称<input value="${loaded ? customer.customerName : ''}" ${loaded ? 'readonly' : ''}></label>
                            <label>证件号码<input value="${loaded ? (customer.idNo || '') : ''}" ${loaded ? 'readonly' : ''}></label>
                            <label>交易代码<input class="field-yellow" value="${tab.code}" readonly></label>
                            <label>交易名称<input value="${tab.name}" readonly></label>
                        </div>
                    </section>
                    <section class="trade-section-block">
                        <div class="trade-section-title">交易信息</div>
                        <div class="trade-form-grid form-grid-2col">
                            <label>受理主题<input class="field-yellow" value="${tab.theme || ''}" readonly></label>
                            <label>目标介质<input value="${state.customerState.intent?.targetDescription || ''}"></label>
                            <label>金额<input value="${state.customerState.intent?.cashAmount || ''}"></label>
                            <label>备注<input value=""></label>
                        </div>
                    </section>
                    <div class="trade-action-row bank-action-row">
                        <button type="button" class="counter-form-btn">提交</button>
                        <button type="button" class="counter-form-btn">退出</button>
                    </div>
                </div>
            `;
        }

        function bindTradeStageActions(activeTab) {
            const loadCustomerZones = tradeStage.querySelectorAll('[data-load-customer]');
            loadCustomerZones.forEach(button => {
                button.addEventListener('click', () => {
                    button.closest('.customer-load-placeholder')?.classList.add('hidden');
                    tradeStage.querySelector('.customer-loaded-board')?.classList.remove('hidden');
                });
            });
        }

        function renderCustomerCard() {
            const { customer, intent, serviceStatus } = state.customerState;
            const hasCustomer = Boolean(customer);
            const isArrived = hasCustomer && serviceStatus !== 'IN_SERVICE';
            floatingCardTitle.textContent = isArrived ? '客户到达提示' : '客户提示';
            floatingCardStatus.textContent = hasCustomer
                ? (serviceStatus === 'IN_SERVICE' ? '客户办理中' : '客户已到达')
                : '当前无客户';
            floatingCardBody.innerHTML = `
                <div class="customer-card-grid bank-customer-grid">
                    <div><span>客户姓名</span><strong>${customer?.customerName || '--'}</strong></div>
                    <div><span>客户诉求</span><strong>${intent?.requestType || '--'}</strong></div>
                    <div class="span-2"><span>目标介质/目标账户</span><strong>${intent?.targetDescription || '--'}</strong></div>
                    <div><span>是否携带现金</span><strong>${intent?.carriesCash ? '是' : '否'}</strong></div>
                    <div><span>携带现金金额</span><strong>${intent?.carriesCash ? formatAmount(intent.cashAmount) : '--'}</strong></div>
                </div>
                <div class="customer-card-actions bank-customer-actions">
                    <button type="button" class="counter-form-btn ${hasCustomer ? 'is-disabled' : ''}" id="customer-arrive-btn" ${hasCustomer ? 'disabled' : ''}>客户到达</button>
                    <button type="button" class="counter-form-btn ${!hasCustomer ? 'is-disabled' : ''}" id="customer-switch-btn" ${!hasCustomer ? 'disabled' : ''}>更换客户</button>
                    <button type="button" class="counter-form-btn ${!hasCustomer ? 'is-disabled' : ''}" id="customer-clear-btn" ${!hasCustomer ? 'disabled' : ''}>关闭客户</button>
                </div>
            `;
            document.getElementById('customer-arrive-btn').addEventListener('click', () => updateCustomerState('/api/counter-customer/arrive'));
            document.getElementById('customer-switch-btn').addEventListener('click', () => updateCustomerState('/api/counter-customer/switch'));
            document.getElementById('customer-clear-btn').addEventListener('click', () => updateCustomerState('/api/counter-customer/clear'));
        }

        async function updateCustomerState(url) {
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' } });
                const nextState = await response.json();
                state.customerState = normalizeCustomerState(nextState);
                renderCustomerCard();
                renderTabs();
            } catch (error) {
                floatingCardStatus.textContent = '操作失败';
            }
        }

        function formatAmount(value) {
            if (value === null || value === undefined || value === '') {
                return '--';
            }
            return `${Number(value).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} 元`;
        }

        function bindCardDrag() {
            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;
            cardHeader.addEventListener('pointerdown', event => {
                if (event.target === cardToggle) {
                    return;
                }
                isDragging = true;
                const rect = floatingCard.getBoundingClientRect();
                offsetX = event.clientX - rect.left;
                offsetY = event.clientY - rect.top;
                cardHeader.setPointerCapture(event.pointerId);
            });
            cardHeader.addEventListener('pointermove', event => {
                if (!isDragging) {
                    return;
                }
                const left = clamp(event.clientX - offsetX, 12, window.innerWidth - floatingCard.offsetWidth - 12);
                const top = clamp(event.clientY - offsetY, 70, window.innerHeight - floatingCard.offsetHeight - 12);
                floatingCard.style.left = `${left}px`;
                floatingCard.style.top = `${top}px`;
                floatingCard.style.right = 'auto';
                floatingCard.style.bottom = 'auto';
            });
            cardHeader.addEventListener('pointerup', event => {
                if (!isDragging) {
                    return;
                }
                isDragging = false;
                cardHeader.releasePointerCapture(event.pointerId);
                sessionStorage.setItem(STORAGE_KEYS.cardPosition, JSON.stringify({ left: floatingCard.style.left, top: floatingCard.style.top }));
            });
            cardToggle.addEventListener('click', () => {
                const collapsed = !floatingCard.classList.contains('collapsed');
                setCardCollapsed(collapsed);
            });
        }

        function restoreCardPosition() {
            const stored = safeJsonParse(sessionStorage.getItem(STORAGE_KEYS.cardPosition), null);
            if (stored?.left && stored?.top) {
                floatingCard.style.left = stored.left;
                floatingCard.style.top = stored.top;
                floatingCard.style.right = 'auto';
                floatingCard.style.bottom = 'auto';
            }
        }

        function applyCardCollapsedState() {
            const collapsed = sessionStorage.getItem(STORAGE_KEYS.cardCollapsed) === '1';
            setCardCollapsed(collapsed);
        }

        function setCardCollapsed(collapsed) {
            floatingCard.classList.toggle('collapsed', collapsed);
            cardToggle.textContent = collapsed ? '恢复' : '—';
            cardToggle.setAttribute('aria-label', collapsed ? '恢复客户提示' : '最小化客户提示');
            sessionStorage.setItem(STORAGE_KEYS.cardCollapsed, collapsed ? '1' : '0');
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }

        function safeJsonParse(raw, fallback) {
            try {
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }
    })();
</script>
