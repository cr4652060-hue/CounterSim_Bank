<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>柜员主界面</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell desk-shell">
    <header class="top-frame-bar">
        <div class="frame-caption">柜面服务平台</div>
        <div class="frame-actions">— □ ×</div>
    </header>

    <header class="top-bar desk-top-bar">
        <div class="brand-lockup brand-lockup-bank">
            <img class="brand-logo-image" th:src="@{/images/logo.png}" src="/images/logo.png" alt="山东农商银行标志">
        </div>
        <nav class="top-nav top-nav-bank">
            <span>任务中心</span>
            <span>消息中心</span>
            <span>帮助中心</span>
            <span>工具中心</span>
            <span>其他系统</span>
        </nav>
        <div class="top-utility-area">
            <div class="trade-search-box bank-search-box" id="trade-search-box">
                <input id="trade-search-input" type="text" autocomplete="off" placeholder="交易码">
                <div class="trade-search-results hidden" id="trade-search-results"></div>
            </div>
            <div class="top-utility-icons">
                <span class="utility-icon">🔒</span>
            </div>
            <div class="avatar-menu teller-menu bank-teller-menu">
                <div class="teller-identity">
                    <div class="teller-code" th:text="${teller.tellerCode}"></div>
                    <div class="teller-name" th:text="${teller.tellerName}"></div>
                </div>
                <form th:action="@{/logout}" method="post" class="top-exit-form">
                    <button type="submit" class="avatar-circle avatar-circle-lite">退</button>
                </form>
            </div>
        </div>
    </header>

    <div class="desk-layout bank-layout">
        <aside class="desk-sidebar bank-sidebar" id="left-sidebar-host"></aside>

        <main class="desk-workspace bank-workspace">
            <section class="desk-tabs-section bank-workspace-shell">
                <div class="trade-tab-strip bank-tab-strip" id="trade-tab-strip"></div>
                <div class="trade-stage bank-trade-stage" id="trade-stage"></div>
            </section>
        </main>
    </div>

    <footer class="desk-status-bar">
        <div>日期: 2026-03-22</div>
        <div>库箱号: 106</div>
        <div th:text="|柜员号: ${teller.tellerCode}|"></div>
    </footer>
</div>

<div class="floating-customer-card bank-customer-card" id="floating-customer-card">
    <div class="floating-card-header bank-customer-header" id="floating-card-header">
        <div class="floating-card-heading">
            <div class="floating-card-title" id="floating-card-title">客户提示</div>
            <div class="floating-card-status" id="floating-card-status">当前无客户</div>
        </div>
        <button type="button" class="card-min-btn" id="customer-card-toggle" aria-label="最小化客户提示">—</button>
    </div>
    <div class="floating-card-body" id="floating-card-body"></div>
</div>

<script th:inline="javascript">
    window.dashboardBootstrap = {
        teller: /*[[${teller}]]*/ {},
        counterCustomerState: /*[[${counterCustomerState}]]*/ {}
    };
</script>
<script>
    (() => {
        const TRADE_DEFINITIONS = [
            { code: '3900', name: '联网核查', keywords: ['3900', '联网核查', '核查'], kind: 'trade' },
            { code: '1061', name: '个人活期存款续存', keywords: ['1061', '续存', '活期', '存款'], kind: 'trade' },
            { code: '1062', name: '个人活期存款现金支取', keywords: ['1062', '支取', '取款', '活期'], kind: 'trade' },
            { code: '1651', name: '个人定期存款开户', keywords: ['1651', '定期开户', '存单开户'], kind: 'trade' },
            { code: '1657', name: '个人定期存款支取', keywords: ['1657', '定期支取', '存单支取'], kind: 'trade' },
            { code: '0055', name: '柜员库箱查询/打印', keywords: ['1657', '柜员库箱', '库箱'], kind: 'trade' }
        ];

        const STORAGE_KEYS = {
            tabs: 'dashboard-open-tabs',
            activeTab: 'dashboard-active-tab',
            cardPosition: 'dashboard-customer-card-position',
            cardCollapsed: 'dashboard-customer-card-collapsed'
        };

        const bootstrap = window.dashboardBootstrap || {};
        const state = {
            teller: bootstrap.teller || {},
            customerState: normalizeCustomerState(bootstrap.counterCustomerState),
            tabs: [],
            activeTabId: null
        };

        const searchBox = document.getElementById('trade-search-box');
        const searchInput = document.getElementById('trade-search-input');
        const searchResults = document.getElementById('trade-search-results');
        const tabStrip = document.getElementById('trade-tab-strip');
        const tradeStage = document.getElementById('trade-stage');
        const leftSidebarHost = document.getElementById('left-sidebar-host');
        const floatingCard = document.getElementById('floating-customer-card');
        const floatingCardBody = document.getElementById('floating-card-body');
        const floatingCardTitle = document.getElementById('floating-card-title');
        const floatingCardStatus = document.getElementById('floating-card-status');
        const cardToggle = document.getElementById('customer-card-toggle');
        const cardHeader = document.getElementById('floating-card-header');

        hydrateTabs();
        restoreCardPosition();
        bindSearch();
        bindCardDrag();
        renderTabs();
        renderCustomerCard();
        applyCardCollapsedState();

        function normalizeCustomerState(raw) {
            if (!raw || !raw.serviceStatus) {
                return { serviceStatus: 'NONE', customer: null, intent: null };
            }
            return raw;
        }

        function hydrateTabs() {
            const storedTabs = safeJsonParse(sessionStorage.getItem(STORAGE_KEYS.tabs), []);
            const storedActiveTab = sessionStorage.getItem(STORAGE_KEYS.activeTab);
            state.tabs = storedTabs
                .map(item => createTabState(getTradeDefinition(item.code), item.id || item.code))
                .filter(Boolean);
            state.activeTabId = state.tabs.some(tab => tab.id === storedActiveTab)
                ? storedActiveTab
                : state.tabs[0]?.id || null;
        }
        function createTabState(definition, id = definition?.code) {
            if (!definition) {
                return null;
            }
            return {
                ...definition,
                id,
                ui: {
                    proxyOpen: false,
                    proxyMode: 'manual',
                    verifyStage: 'entry',
                    customerLoaded: false,
                    mediumDialogOpen: false,
                    mediumDialogValue: '',
                    mediumDialogError: '',
                    mediumDialogMode: '1062',
                    readingIdCard: false,
                    readingIdCardMessage: '请刷身份证……',
                    passwordDialogOpen: false,
                    passwordField: '',
                    passwordReady: {},
                    businessTypeArmed: false,
                    nextFocusField: '',
                    inlineMessage: ''
                },
                form: createInitialForm(definition.code)
            };
        }

        function createInitialForm(code) {
            const commonProxy = {
                idType: '',
                idNo: '',
                name: '',
                gender: '',
                expiry: '',
                phone: '',
                nationality: '',
                result: ''
            };
            const common3900 = {
                idType: '',
                idNo: '',
                customerName: '',
                businessType: '',
                checkResult: '00-身份证号码与姓名一致并存在照片',
                authority: '沂南县公安局',
                validUntil: '2032-02-18'
            };
            switch (code) {
                case '3900':
                    return {
                        ...common3900,
                        identityPhoto: '/images/customer-avatar.png',
                        verifyPhoto: '/images/customer-avatar.png'
                    };
                case '1061':
                    return {
                        accountNo: '',
                        cardNo: '',
                        customerName: '',
                        idType: '',
                        idNo: '',
                        currentBalance: '',
                        depositAmount: '',
                        cashSource: '',
                        currency: '',
                        cashFlag: '',
                        summary: '',
                        notes: '',
                        voucherNo: '',
                        feeMode: '',
                        proxyFlag: '',
                        accountNature: '',
                        accountType: '个人活期',
                        proxy: { ...commonProxy },
                        verify: { ...common3900 }
                    };
                case '1062':
                    return {
                        accountNo: '',
                        cardNo: '',
                        customerName: '',
                        idType: '',
                        idNo: '',
                        accountType: '',
                        availableBalance: '',
                        withdrawAmount: '',
                        password: '',
                        cashFlag: '',
                        currency: '',
                        summary: '',
                        notes: '',
                        voucherNo: '',
                        mediumNo: '',
                        volumeNo: '',
                        accountSeq: '',
                        accountBranchNo: '',
                        accountSubSeq: '',
                        withdrawMode: '',
                        feeMode: '',
                        feeAmount: '',
                        proxyFlag: '',
                        accountNature: '',
                        ledgerFlag: '0-无',
                        proxy: { ...commonProxy },
                        verify: { ...common3900 }
                    };
                case '1651':
                    return {
                        certType: '',
                        certNo: '',
                        customerName: '',
                        mobile: '',
                        customerNo: '',
                        depositType: '整存整取',
                        term: '',
                        amount: '',
                        rateType: '',
                        transferAccount: '',
                        printNo: '',
                        tradeCategory: '',
                        currency: '',
                        productCode: '',
                        transferFlag: '',
                        transferMode: '',
                        interestAccount: '',
                        interBankFlag: '',
                        withdrawMode: '',
                        password: '',
                        depositPrintNo: '',
                        voucherType: '',
                        startDate: '',
                        floatRate: '',
                        summary: '',
                        notes: '',
                        proxyFlag: '',
                        accountNo: '',
                        accountBalance: '',
                        verify: { ...common3900 },
                        proxy: { ...commonProxy }
                    };
                case '1657':
                    return {
                        passbookFlag: '',
                        accountNo: '',
                        volumeNo: '',
                        printNo: '',
                        lossFlag: '',
                        customerName: '',
                        payoutMode: '',
                        withdrawType: '',
                        tradeType: '',
                        currency: '156-CNY 人民币',
                        cashFlag: '钞',
                        unpaidPrincipal: '',
                        noticeNo: '',
                        noticeMode: '',
                        password: '',
                        withdrawAmount: '',
                        maturityFlag: '',
                        certType: '',
                        certNo: '',
                        exchangeReceiptNo: '',
                        nonCompulsoryEduProof: '',
                        newVoucherType: '',
                        newPrintNo: '',
                        rateAdjustMode: '',
                        rateAdjustSign: '',
                        rateAdjustValue: '',
                        rateValue: '0.00000',
                        fxBusinessNo: '',
                        summary: '',
                        notes: '',
                        proxy: { ...commonProxy },
                        transfer: { receiveAccount: '', receiveName: '', receiveBank: '', receiveAmount: '' }
                    };
                default:
                    return {};
            }
        }
        function persistTabs() {
            sessionStorage.setItem(STORAGE_KEYS.tabs, JSON.stringify(state.tabs.map(tab => ({ id: tab.id, code: tab.code }))));
            if (state.activeTabId) {
                sessionStorage.setItem(STORAGE_KEYS.activeTab, state.activeTabId);
            } else {
                sessionStorage.removeItem(STORAGE_KEYS.activeTab);
            }
        }

        function getTradeDefinition(code) {
            return TRADE_DEFINITIONS.find(item => item.code === code);
        }

        function bindSearch() {
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim()) {
                    renderSearchResults(searchInput.value.trim());
                }
            });
            searchInput.addEventListener('input', () => {
                const keyword = searchInput.value.trim();
                if (!keyword) {
                    searchResults.classList.add('hidden');
                    searchResults.innerHTML = '';
                    return;
                }
                renderSearchResults(keyword);
            });
            searchInput.addEventListener('keydown', event => {
                if (event.key !== 'Enter') {
                    return;
                }
                event.preventDefault();
                const keyword = searchInput.value.trim();
                if (!keyword) {
                    return;
                }
                const exact = TRADE_DEFINITIONS.find(item => item.code === keyword);
                const firstMatch = exact || findMatches(keyword)[0];
                if (firstMatch) {
                    openTrade(firstMatch.code);
                    searchInput.value = '';
                    searchResults.classList.add('hidden');
                }
            });
            document.addEventListener('click', event => {
                if (!searchBox.contains(event.target)) {
                    searchResults.classList.add('hidden');
                }
            });
        }
        function bindWindowMessaging() {
            window.addEventListener('message', event => {
                if (event.data?.type === 'close-trade' && event.data.tradeCode) {
                    const tab = state.tabs.find(item => item.code === event.data.tradeCode);
                    if (tab) {
                        closeTrade(tab.id);
                    }
                }
            });
        }
        function findMatches(keyword) {
            const normalized = keyword.toLowerCase();
            return TRADE_DEFINITIONS.filter(item => item.code.toLowerCase().includes(normalized)
                || item.name.toLowerCase().includes(normalized)
                || item.keywords.some(word => word.toLowerCase().includes(normalized)));
        }

        function renderSearchResults(keyword) {
            const matched = findMatches(keyword);
            if (!matched.length) {
                searchResults.innerHTML = '<div class="search-empty bank-search-empty">未找到对应交易</div>';
            } else {
                searchResults.innerHTML = matched.map(item => `
                    <button type="button" class="search-result-item bank-search-result" data-trade-code="${item.code}">
                        <span class="search-result-code">${item.code}</span>
                        <span class="search-result-name">${item.name}</span>
                    </button>
                `).join('');
                searchResults.querySelectorAll('[data-trade-code]').forEach(button => {
                    button.addEventListener('click', () => {
                        openTrade(button.dataset.tradeCode);
                        searchInput.value = '';
                        searchResults.classList.add('hidden');
                    });
                });
            }
            searchResults.classList.remove('hidden');
        }

        function openTrade(code) {
            const definition = getTradeDefinition(code);
            if (!definition) {
                return;
            }
            const existing = state.tabs.find(tab => tab.code === code);
            if (existing) {
                state.activeTabId = existing.id;
            } else {
                const tab = createTabState(definition, code);
                state.tabs.push(tab);
                state.activeTabId = tab.id;
            }
            persistTabs();
            renderTabs();
        }

        function closeTrade(tabId) {
            const index = state.tabs.findIndex(tab => tab.id === tabId);
            if (index < 0) {
                return;
            }
            const wasActive = state.activeTabId === tabId;
            state.tabs.splice(index, 1);
            if (wasActive) {
                state.activeTabId = state.tabs[index - 1]?.id || state.tabs[index]?.id || null;
            }
            persistTabs();
            renderTabs();
        }

        function renderTabs() {
            if (!state.tabs.length) {
                tabStrip.innerHTML = '<div class="tab-strip-empty bank-tab-empty"></div>';
                tradeStage.innerHTML = '<div class="workspace-blank"></div>';
                leftSidebarHost.innerHTML = renderSidebarPanel(null);
                return;
            }

            tabStrip.innerHTML = state.tabs.map(tab => `
                <div class="trade-tab bank-trade-tab ${tab.id === state.activeTabId ? 'active' : ''}" data-tab-id="${tab.id}">
                    <button type="button" class="trade-tab-switch">
                        <span class="trade-tab-code">${tab.code}</span>
                        <span>${tab.name}</span>
                    </button>
                    <button type="button" class="trade-tab-close" aria-label="关闭 ${tab.name}">×</button>
                </div>
            `).join('');

            tabStrip.querySelectorAll('.trade-tab').forEach(tabNode => {
                const tabId = tabNode.dataset.tabId;
                tabNode.querySelector('.trade-tab-switch').addEventListener('click', () => {
                    state.activeTabId = tabId;
                    persistTabs();
                    renderTabs();
                });
                tabNode.querySelector('.trade-tab-close').addEventListener('click', event => {
                    event.stopPropagation();
                    closeTrade(tabId);
                });
            });

            const activeTab = state.tabs.find(tab => tab.id === state.activeTabId) || state.tabs[0];
            state.activeTabId = activeTab.id;
            persistTabs();
            leftSidebarHost.innerHTML = renderSidebarPanel(activeTab);
            tradeStage.innerHTML = renderTradeContent(activeTab);
            bindTradeStageActions(activeTab);
            focusFirstEditableField();
        }

        function renderTradeContent(tab) {
            if (tab.kind === 'iframe') {
                return `
                    <div class="trade-pane trade-pane-iframe bank-iframe-pane">
                        <iframe src="${tab.src}" title="${tab.code} ${tab.name}"></iframe>
                    </div>
                `;
            }
            return renderSimulatedTradeWindow(tab);
        }

        function renderSimulatedTradeWindow(tab) {

            return `
                <div class="trade-pane bank-trade-pane" data-active-trade="${tab.code}">
                    <div class="sim-counter-window">
                        <div class="sim-window-titlebar">${tab.code} - ${tab.name}</div>
                        <div class="sim-window-body trade-scroll-body">
                            ${renderTradeBody(tab)}
                        </div>
                    </div>
                </div>
            `;
        }


        function renderSidebarPanel(activeTab) {
            if (!activeTab || !['3900', '1062', '1657','1061','1651'].includes(activeTab.code) || !activeTab.ui.customerLoaded) {
                return `
                    <div class="sidebar-mode sidebar-mode-default">
                        <section class="sidebar-panel queue-panel sidebar-panel-block">
                            <div class="queue-panel-main">
                                <div class="queue-metrics">
                                    <div><span>排队号:</span><strong>--</strong></div>
                                    <div><span>等待人数:</span><strong>3</strong></div>
                                    <div><span>窗口号:</span><strong>${escapeHtml(state.teller?.tellerCode || '--')}</strong></div>
                                    <div><span>状态:</span><strong>受理中</strong></div>
                                </div>
                                <div class="queue-primary-actions">
                                    <button type="button" class="counter-mini-btn wide">签到</button>
                                    <button type="button" class="counter-mini-btn wide">暂停</button>
                                    <button type="button" class="counter-mini-btn wide">评价</button>
                                </div>
                            </div>
                            <div class="queue-side-actions">
                                <button type="button" class="counter-mini-btn">顺呼</button>
                                <button type="button" class="counter-mini-btn">重呼</button>
                                <button type="button" class="counter-mini-btn compact-side-btn">呼叫大堂</button>
                                <button type="button" class="counter-mini-btn compact-side-btn">呼叫主管</button>
                            </div>
                        </section>
                        <section class="sidebar-panel info-panel sidebar-panel-block">
                            <div class="panel-caption">客户信息区</div>
                            <div class="sidebar-placeholder-body">
                                <div>当前交易尚未带出客户。</div>
                                <div>请在 ${activeTab ? activeTab.code : '--'} 页面完成账号、介质号、凭证印刷号或身份证读取后，再切换为客户信息区。</div>
                            </div>
                        </section>
                        <section class="sidebar-panel info-panel filler-panel sidebar-panel-block">
                            <div class="panel-caption">柜面提示</div>
                            <div class="sidebar-note-body">左侧区域已重构为单一模板：默认显示柜面/排队信息，带出客户后整块替换为客户信息区，不再叠加两套左侧结构。</div>
                        </section>
                    </div>
                `;
            }
            const summary = buildSidebarCustomerSummary(activeTab);
            return `
                <div class="sidebar-mode sidebar-mode-customer">
                    <section class="sidebar-panel customer-sidebar-panel sidebar-panel-block">
                        <div class="panel-caption">客户信息区</div>
                        <div class="customer-sidebar-header">
                            <img src="/images/customer-avatar.png" alt="客户头像">
                            <div>
                                <strong>${escapeHtml(summary.name || '--')}</strong>
                                <span>${escapeHtml(activeTab.code)} 提交前办理</span>
                            </div>
                        </div>
                        <div class="customer-sidebar-grid">
                            ${summary.rows.map(row => `
                                <div class="customer-sidebar-row">
                                    <span>${row.label}</span>
                                    <strong>${escapeHtml(row.value || '--')}</strong>
                                </div>
                            `).join('')}
                        </div>
                        <div class="customer-sidebar-hint">当前客户由本交易页明确带出后替换显示；切换客户或关闭客户后，左侧会恢复默认柜面信息区。</div>
                    </section>
                </div>
            `;
        }

        function buildSidebarCustomerSummary(tab) {
            if (tab.code === '3900') {
                return {
                    name: tab.form.customerName,
                    rows: [
                        { label: '证件类型', value: tab.form.idType },
                        { label: '证件号码', value: tab.form.idNo },
                        { label: '业务种类', value: tab.form.businessType },
                        { label: '核查状态', value: '提交前录入' }
                    ]
                };
            }
            if (tab.code === '1062') {
                return {
                    name: tab.form.customerName,
                    rows: [
                        { label: '证件号码', value: tab.form.idNo },
                        { label: '介质号码', value: tab.form.mediumNo },
                        { label: '账号', value: tab.form.accountNo },
                        { label: '可用余额', value: tab.form.availableBalance }
                    ]
                };
            }
            return {
                name: tab.form.customerName,
                rows: [
                    { label: '目标凭证号', value: tab.form.printNo },
                    { label: '目标账户', value: tab.form.accountNo },
                    { label: '证件号码', value: tab.form.certNo },
                    { label: '支取金额', value: tab.form.withdrawAmount }
                ]
            };
        }

        function renderTradeBody(tab) {
            switch (tab.code) {
                case '3900':
                    return render3900Standalone(tab);
                case '1061':
                    return render1061(tab);
                case '1062':
                    return render1062(tab);
                case '1651':
                    return render1651(tab);
                case '1657':
                    return render1657(tab);
                default:
                    return '';
            }
        }

        function render1061(tab) {
            const f = tab.form;
            return `
<!--                <section class="trade-section-block">-->
                 <div class="trade-page trade-page-bankform">
                            <div class="trade-section-title">账户信息</div>
                            <div class="trade-form-grid form-grid-2col bank-form-grid dense-grid">
                                ${field('交易类别', select('withdrawMode', f.withdrawMode, ['', '1-现金'], { gray: true, readonly: true }))}
                                ${field('币种', select('currency', f.currency, ['156-CNY人民币'], { yellow: true, required: true, navType: 'select' }))}
                                ${field('钞汇标志', select('cashFlag', f.cashFlag, ['0-钞', '1-汇'], { yellow: true, required: true, navType: 'select' }))}
                                ${field('金额')}
                                ${field('账号', input('accountNo', f.accountNo, { yellow: true, autofocus: true, placeholder: '请输入账号或读卡后带出' }))}
                                ${field('客户账号', input('accountNo', f.accountNo, { gray: true, readonly: true }))}
                                ${field('卡号/折号', input('cardNo', f.cardNo, { placeholder: '支持鼠标点选修改' }))}
                                ${field('客户名称', input('customerName', f.customerName, { readonly: true, gray: true }))}
                                ${field('证件类型', input('idType', f.idType, { readonly: true, gray: true }))}
                                ${field('证件号码', input('idNo', f.idNo, { readonly: true, gray: true }))}
                                ${field('账户类型', input('accountType', f.accountType, { readonly: true, gray: true }))}
                                ${field('当前余额', input('currentBalance', f.currentBalance, { readonly: true, gray: true }))}
                                ${field('凭证号', input('voucherNo', f.voucherNo, { readonly: true, gray: true }))}
                            </div>
                        </section>
                          <section class="trade-section-block bank-section-1062-sub">
                            <div class="trade-section-title">代理人信息</div>
                            <div class="trade-form-grid form-grid-2col bank-form-grid fixed-layout-grid">
                                ${field('是否代理', select('proxyFlag', f.proxyFlag || 'N-否', ['N-否', 'Y-是'], { yellow: true, required: true, navType: 'select' }))}

                        </div>
                        <div class="verify-result-footer">
                            <label class="verify-result-select"><span>核查结果</span>${select(`${fieldPrefix}checkResult`, verify.checkResult, ['00-身份证号码与姓名一致并存在照片'])}</label>
                            <div class="trade-action-row bank-action-row dialog-actions">
                                <button type="button" class="counter-form-btn">维护客户头像</button>
                                <button type="button" class="counter-form-btn">打印</button>
                                <button type="button" class="counter-form-btn" data-tab-action="${actionPrefix}close-verify">关闭</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="bank-dialog verify-dialog ${standalone ? 'standalone-dialog' : ''}">
                    <div class="bank-dialog-title">3900-联网核查</div>
                     ${renderInlineMessage(tab)}
                    <div class="verify-entry-form">
                        <div class="trade-form-grid form-grid-2col bank-form-grid dense-grid fixed-layout-grid">
                            ${field('证件类型', select(`${fieldPrefix}idType`, verify.idType, ['', '1001-第二代居民身份证', '1002-临时身份证'], { yellow: true, autofocus: true }))}
                            ${field('证件号码', input(`${fieldPrefix}idNo`, verify.idNo, { yellow: true, readCardTrigger: standalone ? '3900' : '', placeholder: '回车进入本框后模拟刷身份证' }))}
                            ${field('客户名称', input(`${fieldPrefix}customerName`, verify.customerName, { gray: true, readonly: true, enterInclude: true, cursorReadonly: true }))}
                            ${field('业务种类', select(`${fieldPrefix}businessType`, verify.businessType, ['', '01-银行卡业务', '02-存款业务', '03-支取业务'], { yellow: true }))}
                        </div>
                    </div>
                    <div class="trade-action-row bank-action-row dialog-actions">
                        <button type="button" class="counter-form-btn" data-tab-action="${actionPrefix}submit-verify" data-enter-target="true">提交</button>
                        <button type="button" class="counter-form-btn" data-tab-action="${actionPrefix}close-verify" data-enter-target="true">退出</button>
                    </div>
                </div>
            `;
        }

        function renderInlineMessage(tab) {
            if (!tab.ui.inlineMessage) {
                return '';
            }
            return `<div class="trade-inline-message">${escapeHtml(tab.ui.inlineMessage)}</div>`;
        }

        function renderMediumDialog(tab) {
            if (!tab.ui.mediumDialogOpen) {
                return '';
            }
            return `
                <div class="trade-overlay">
                    <div class="bank-dialog small-dialog">
                        <div class="bank-dialog-title">${tab.ui.mediumDialogMode === '1062' ? '介质选择 / 刷卡模拟' : '凭证带出模拟'}</div>
                        <div class="dialog-tip-block">
                            <div>${tab.ui.mediumDialogMode === '1062' ? '请录入介质号码并回车，模拟刷卡后带出客户。' : '请录入凭证印刷号或账号并回车，带出当前黄框客户。'}</div>
                            <div class="dialog-error-text">${escapeHtml(tab.ui.mediumDialogError || '')}</div>
                        </div>
                        <div class="trade-form-grid bank-form-grid dense-grid">
                            ${field(tab.ui.mediumDialogMode === '1062' ? '介质号码' : '凭证印刷号', input('dialog.medium', tab.ui.mediumDialogValue, { yellow: true, autofocus: true, placeholder: '输入后按回车确认' }))}
                        </div>
                        <div class="trade-action-row bank-action-row dialog-actions">
                            <button type="button" class="counter-form-btn" data-tab-action="confirm-medium-dialog" data-enter-target="true">确认</button>
                            <button type="button" class="counter-form-btn" data-tab-action="close-medium-dialog" data-enter-target="true">退出</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderReadIdDialog(tab) {
            if (!tab.ui.readingIdCard) {
                return '';
            }
            return `
                <div class="trade-overlay">
                    <div class="bank-dialog small-dialog read-id-dialog">
                        <div class="bank-dialog-title">提示</div>
                        <div class="read-id-message">${escapeHtml(tab.ui.readingIdCardMessage || '请刷身份证……')}</div>
                        <div class="read-id-spinner"></div>
                    </div>
                </div>
            `;
        }

        function renderPasswordDialog(tab) {
            if (!tab.ui.passwordDialogOpen) {
                return '';
            }
            return `
                <div class="trade-overlay">
                    <div class="bank-dialog small-dialog read-id-dialog">
                        <div class="bank-dialog-title">密码输入</div>
                        <div class="read-id-message">请输入交易密码……</div>
                        <div class="read-id-spinner"></div>
                    </div>
                </div>
            `;
        }
        function verifyResultRow(labelText, value) {
            return `<label><span>${labelText}</span><input value="${escapeHtml(value || '')}" readonly></label>`;
        }

        function bindTradeStageActions(activeTab) {
            bindUnifiedFocusStateMachine(activeTab);
            bindEnterAdvance(tradeStage);

            tradeStage.querySelectorAll('[data-close-trade]').forEach(button => {
                button.addEventListener('click', () => closeTrade(activeTab.id));
            });

            tradeStage.querySelectorAll('[data-tab-action]').forEach(button => {
                button.addEventListener('click', () => handleTabAction(activeTab, button.dataset.tabAction));
            });
        }

        function bindFieldChanges(tab) {
            tradeStage.querySelectorAll('[data-field]').forEach(fieldNode => {
                const syncValue = event => {
                    const path = fieldNode.dataset.field;
                    if (path === 'dialog.medium') {
                        tab.ui.mediumDialogValue = event.target.value;
                        return;
                    }
                    setFormValue(tab.form, path, event.target.value);
                    if (path === 'businessType') {
                        tab.ui.businessTypeArmed = Boolean(event.target.value);
                    }
                    if (tab.ui.inlineMessage) {
                        tab.ui.inlineMessage = '';
                    }
                };
                fieldNode.addEventListener('input', syncValue);
                fieldNode.addEventListener('change', syncValue);
            });
        }

        function bindUnifiedFocusStateMachine(tab) {
            const nodes = getNavigableNodes();
            nodes.forEach(node => {
                if (node.dataset.navType === 'medium-trigger') {
                    node.addEventListener('mousedown', event => {
                        if (!tab.ui.customerLoaded) {
                            event.preventDefault();
                            openMediumDialog(tab, '1062');
                        }
                    });
                }
                if (node.dataset.field === 'dialog.medium') {
                    node.addEventListener('keydown', event => {
                        if (event.key === 'Enter') {
                            event.preventDefault();
                            confirmMediumDialog(tab);
                        }
                    });
                }
                if (node.dataset.navType === 'password') {
                    node.addEventListener('focus', () => {
                        const field = node.dataset.field;
                        if (!tab.ui.passwordReady[field]) {
                            openPasswordDialog(tab, field);
                        }
                    });
                }
                if (node.dataset.navType === 'id-read') {
                    node.addEventListener('focus', () => {
                        if (tab.code === '3900' && !tab.ui.readingIdCard && !tab.form.idNo && tab.form.idType === '1001-第二代居民身份证') {
                            start3900IdRead(tab);
                        }
                    });
                }
                if (node.dataset.navType === 'lookup-1657') {
                    node.addEventListener('blur', () => {
                        if (tab.code === '1657' && (tab.form.printNo || tab.form.accountNo) && !tab.ui.customerLoaded) {
                            attempt1657Lookup(tab);
                            renderTabs();
                        }
                    });
                }
                node.addEventListener('keydown', event => handleUnifiedKeydown(tab, event, node));
            });
        }

        function handleUnifiedKeydown(tab, event, node) {
            if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
                if (node.dataset.buttonGroup) {
                    event.preventDefault();
                    moveButtonFocus(node.dataset.buttonGroup, event.key === 'ArrowDown' ? 1 : -1);
                }
                return;
            }
            if (event.key !== 'Enter' || event.shiftKey || event.target.tagName === 'TEXTAREA') {
                return;
            }
            if (node.dataset.buttonGroup) {
                event.preventDefault();
                node.click();
                return;
            }
            if (node.dataset.navType === 'medium-trigger' && !tab.ui.customerLoaded) {
                event.preventDefault();
                openMediumDialog(tab, '1062');
                return;
            }
            if (node.dataset.navType === 'lookup-1657') {
                event.preventDefault();
                if (attempt1657Lookup(tab)) {
                    renderTabs();
                    requestAnimationFrame(() => focusField('withdrawType'));
                } else {
                    renderTabs();
                    requestAnimationFrame(() => focusField(node.dataset.field));
                }
                return;
            }
            if (node.dataset.navType === 'password') {
                const field = node.dataset.field;
                if (!tab.ui.passwordReady[field]) {
                    event.preventDefault();
                    openPasswordDialog(tab, field);
                    return;
                }
            }
            if (node.tagName === 'SELECT') {
                if (!node.value) {
                    event.preventDefault();
                    if (typeof node.showPicker === 'function') {
                        node.showPicker();
                        return;
                    }
                    tab.ui.inlineMessage = '当前下拉项尚未选择，不能直接回车跳过。';
                    renderTabs();
                    requestAnimationFrame(() => focusField(node.dataset.field));
                    return;
                }
                if (node.dataset.field === 'businessType' && !tab.ui.businessTypeArmed) {
                    event.preventDefault();
                    tab.ui.inlineMessage = '请先选择业务种类，再回车进入按钮区。';
                    renderTabs();
                    requestAnimationFrame(() => focusField('businessType'));
                    return;
                }
            }
            if (node.dataset.navType === 'id-read' && !tab.form.idNo) {
                event.preventDefault();
                return;
            }
            event.preventDefault();
            focusNextNode(node);
        }

        function getNavigableNodes() {
            return Array.from(tradeStage.querySelectorAll('[data-nav-type], button[data-enter-target="true"], input[data-enter-include="true"]'))
                .filter(node => isEnterNavigable(node));
        }

        function focusNextNode(currentNode) {
            const nodes = getNavigableNodes();
            const index = nodes.indexOf(currentNode);
            const next = nodes.slice(index + 1).find(node => !node.closest('.hidden'));
            if (next) {
                next.focus();
                if (next.select) {
                    next.select();
                }
            }
        }

        function moveButtonFocus(group, direction) {
            const buttons = Array.from(tradeStage.querySelectorAll(`[data-button-group="${group}"]`));
            const currentIndex = buttons.findIndex(button => button === document.activeElement);
            const nextIndex = currentIndex < 0 ? 0 : Math.max(0, Math.min(buttons.length - 1, currentIndex + direction));
            buttons[nextIndex]?.focus();
        }

        function focusFirstEditableField() {
            requestAnimationFrame(() => {
                const activeTab = state.tabs.find(tab => tab.id === state.activeTabId);
                if (activeTab?.ui.nextFocusField) {
                    const targetField = activeTab.ui.nextFocusField;
                    activeTab.ui.nextFocusField = '';
                    focusField(targetField);
                    return;
                }
                const first = getNavigableNodes().find(node => node.hasAttribute('autofocus')) || getNavigableNodes()[0];
                if (first) {
                    first.focus();
                    if (first.select) {
                        first.select();
                    }
                }
            });
        }

        function focusField(fieldName) {
            const node = tradeStage.querySelector(`[data-field="${fieldName}"]`);
            if (node) {
                node.focus();
                if (node.select) {
                    node.select();
                }
            }
        }

        function setFormValue(target, path, value) {
            const segments = path.split('.');
            let cursor = target;
            segments.slice(0, -1).forEach(segment => {
                if (!cursor[segment]) {
                    cursor[segment] = {};
                }
                cursor = cursor[segment];
            });
            cursor[segments.at(-1)] = value;
        }

        function field(labelText, control, options = {}) {
            const classNames = [options.span === 2 ? 'span-2' : '', options.emphasize ? 'field-emphasis' : ''].filter(Boolean).join(' ');
            return `<label class="${classNames}"><span>${labelText}</span>${control}</label>`;
        }

        function input(name, value = '', options = {}) {
            const classes = [options.yellow ? 'field-yellow' : '', options.gray ? 'field-gray' : '', options.cursorReadonly ? 'field-readonly-cursor' : ''].filter(Boolean).join(' ');
            return `<input data-field="${name}" data-nav-type="${options.navType || (options.enterInclude ? 'readonly-focus' : 'input')}" ${options.required ? 'data-required="true"' : ''} class="${classes}" value="${escapeHtml(value || '')}" ${options.readonly ? 'readonly' : ''} ${options.autofocus ? 'autofocus' : ''} ${options.enterInclude ? 'data-enter-include="true"' : ''} ${options.placeholder ? `placeholder="${escapeHtml(options.placeholder)}"` : ''} ${options.type ? `type="${options.type}"` : 'type="text"'}>`;
        }

        function select(name, value = '', values = [], options = {}) {
            const classes = [options.yellow ? 'field-yellow' : '', options.gray ? 'field-gray' : ''].filter(Boolean).join(' ');
            const normalizedValues = values.length ? values : [''];
            return `
                <select data-field="${name}" data-nav-type="${options.navType || 'select'}" ${options.required ? 'data-required="true"' : ''} class="${classes}" ${options.autofocus ? 'autofocus' : ''} ${options.enterInclude ? 'data-enter-include="true"' : ''} ${options.readonly ? 'disabled' : ''}>
                    ${normalizedValues.map(item => `<option value="${escapeHtml(item)}" ${item === value ? 'selected' : ''}>${item}</option>`).join('')}
                </select>
            `;
        }

        function hasProxyFilled(proxy) {
            return Boolean(proxy && (proxy.name || proxy.idNo || proxy.phone));
        }

        function formatAmount(value) {
            if (value === null || value === undefined || value === '') {
                return '--';
            }
            return `${Number(value).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} 元`;
        }

        function isEnterNavigable(node) {
            return node
                && node.offsetParent !== null
                && !node.disabled
                && (!node.readOnly || node.dataset.enterInclude === 'true' || node.tagName === 'BUTTON');
        }

        function openMediumDialog(tab, mode) {
            tab.ui.mediumDialogOpen = true;
            tab.ui.mediumDialogMode = mode;
            tab.ui.mediumDialogValue = mode === '1062' ? tab.form.mediumNo || '' : tab.form.printNo || '';
            tab.ui.mediumDialogError = '';
            renderTabs();
        }

        function closeMediumDialog(tab) {
            tab.ui.mediumDialogOpen = false;
            tab.ui.mediumDialogError = '';
            renderTabs();
        }

        function confirmMediumDialog(tab) {
            const currentCustomer = state.customerState.customer;
            const mediumInput = (tab.ui.mediumDialogValue || '').trim();
            if (!currentCustomer) {
                tab.ui.mediumDialogError = '当前黄框没有客户，无法带出。';
                renderTabs();
                return;
            }
            if (!mediumInput) {
                tab.ui.mediumDialogError = tab.ui.mediumDialogMode === '1062' ? '请输入介质号码。' : '请输入凭证印刷号。';
                renderTabs();
                return;
            }
            if (tab.ui.mediumDialogMode === '1062') {
                const matched = (currentCustomer.mediaDetails || []).find(item => item.mediumNo === mediumInput);
                if (!matched) {
                    tab.ui.mediumDialogError = '未在当前黄框客户下找到该介质号码，请核对后重试。';
                    renderTabs();
                    return;
                }
                hydrateFormFromResolvedMedium(tab, currentCustomer, matched);
                tab.ui.nextFocusField = 'currency';
                tab.ui.inlineMessage = '已通过介质号带出当前客户，可继续录入支取金额、摘要、密码等信息。';
            }
            tab.ui.mediumDialogOpen = false;
            tab.ui.mediumDialogError = '';
            renderTabs();
        }

        function hydrateFormFromResolvedMedium(tab, customer, medium) {
            const intent = state.customerState.intent;
            Object.assign(tab.form, {
                accountNo: medium.customerAccountNo || '',
                mediumNo: medium.mediumNo || '',
                customerName: customer.customerName || '',
                idType: customer.idType || '1001-第二代居民身份证',
                idNo: customer.idNo || '',
                accountType: medium.accountCategory || '1-类',
                availableBalance: medium.balanceAmount ? Number(medium.balanceAmount).toFixed(2) : '',
                voucherNo: medium.voucherNo || medium.mediumNo || '',
                withdrawAmount: intent?.cashAmount || '',
                withdrawMode: '0001-凭密码',
                accountNature: medium.accountCategory || '',
                volumeNo: medium.mediumSubType || '',
                accountSeq: '001',
                accountBranchNo: '0101',
                accountSubSeq: '001',
                feeAmount: '',
                proxyFlag: 'N-否'
            });
            tab.ui.customerLoaded = true;
        }

        function attempt1657Lookup(tab) {
            const customer = state.customerState.customer;
            const value = (tab.form.printNo || tab.form.accountNo || '').trim();
            if (!value) {
                return true;
            }
            if (!customer) {
                tab.ui.inlineMessage = '当前黄框没有客户，无法按凭证印刷号带出。';
                return false;
            }
            const matched = (customer.mediaDetails || []).find(item => item.voucherNo === value || item.mediumNo === value || item.customerAccountNo === value);
            if (!matched) {
                tab.ui.inlineMessage = '凭证印刷号/账号与当前黄框客户不一致，未带出客户信息。';
                return false;
            }
            Object.assign(tab.form, {
                accountNo: matched.customerAccountNo || tab.form.accountNo,
                printNo: matched.voucherNo || matched.mediumNo || tab.form.printNo,
                volumeNo: matched.mediumSubType || '01',
                lossFlag: matched.mediaStatus || '正常',
                customerName: customer.customerName || '',
                payoutMode: '现金',
                certType: customer.idType || '',
                certNo: customer.idNo || '',
                withdrawAmount: state.customerState.intent?.cashAmount || '',
                tradeType: '',
                withdrawType: ''
            });
            tab.ui.customerLoaded = true;
            tab.ui.inlineMessage = '已按当前黄框客户的凭证印刷号带出存单信息，可继续录入支取类别、交易类别、金额和密码。';
            return true;
        }

        function openPasswordDialog(tab, field) {
            tab.ui.passwordDialogOpen = true;
            tab.ui.passwordField = field;
            renderTabs();
            window.setTimeout(() => {
                tab.ui.passwordDialogOpen = false;
                tab.ui.passwordReady = { ...tab.ui.passwordReady, [field]: true };
                setFormValue(tab.form, field, '●●●●●●');
                renderTabs();
                requestAnimationFrame(() => focusField(field));
            }, 3000);
        }

        function start3900IdRead(tab) {
            const customer = state.customerState.customer;
            tab.ui.readingIdCard = true;
            tab.ui.readingIdCardMessage = '请刷身份证……';
            renderTabs();
            window.setTimeout(() => {
                const idNo = customer?.idNo || '371321198311107948';
                const customerName = customer?.customerName || '王雯';
                tab.form.idNo = idNo;
                tab.form.customerName = customerName;
                tab.ui.customerLoaded = true;
                tab.ui.readingIdCard = false;
                tab.ui.inlineMessage = '身份证读取完成，请先在证件号码框确认，再回车到客户名称。';
                renderTabs();
                requestAnimationFrame(() => {
                    const idField = tradeStage.querySelector('[data-field="idNo"]');
                    if (idField) {
                        idField.focus();
                    }
                });
            }, 3000);
        }
        function bindCardDrag() {
            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;
            cardHeader.addEventListener('pointerdown', event => {
                if (event.target === cardToggle) {
                    return;
                }
                isDragging = true;
                const rect = floatingCard.getBoundingClientRect();
                offsetX = event.clientX - rect.left;
                offsetY = event.clientY - rect.top;
                cardHeader.setPointerCapture(event.pointerId);
            });
            cardHeader.addEventListener('pointermove', event => {
                if (!isDragging) {
                    return;
                }
                const left = clamp(event.clientX - offsetX, 12, window.innerWidth - floatingCard.offsetWidth - 12);
                const top = clamp(event.clientY - offsetY, 70, window.innerHeight - floatingCard.offsetHeight - 12);
                floatingCard.style.left = `${left}px`;
                floatingCard.style.top = `${top}px`;
                floatingCard.style.right = 'auto';
                floatingCard.style.bottom = 'auto';
            });
            cardHeader.addEventListener('pointerup', event => {
                if (!isDragging) {
                    return;
                }
                isDragging = false;
                cardHeader.releasePointerCapture(event.pointerId);
                sessionStorage.setItem(STORAGE_KEYS.cardPosition, JSON.stringify({ left: floatingCard.style.left, top: floatingCard.style.top }));
            });
            cardToggle.addEventListener('click', () => {
                const collapsed = !floatingCard.classList.contains('collapsed');
                setCardCollapsed(collapsed);
            });
        }

        function restoreCardPosition() {
            const stored = safeJsonParse(sessionStorage.getItem(STORAGE_KEYS.cardPosition), null);
            if (stored?.left && stored?.top) {
                floatingCard.style.left = stored.left;
                floatingCard.style.top = stored.top;
                floatingCard.style.right = 'auto';
                floatingCard.style.bottom = 'auto';
            }
        }

        function applyCardCollapsedState() {
            const collapsed = sessionStorage.getItem(STORAGE_KEYS.cardCollapsed) === '1';
            setCardCollapsed(collapsed);
        }

        function setCardCollapsed(collapsed) {
            floatingCard.classList.toggle('collapsed', collapsed);
            cardToggle.textContent = collapsed ? '恢复' : '—';
            cardToggle.setAttribute('aria-label', collapsed ? '恢复客户提示' : '最小化客户提示');
            sessionStorage.setItem(STORAGE_KEYS.cardCollapsed, collapsed ? '1' : '0');
        }

        function clamp(value, min, max) {
            return Math.min(Math.max(value, min), max);
        }
        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }
        function safeJsonParse(raw, fallback) {
            try {
                return raw ? JSON.parse(raw) : fallback;
            } catch (error) {
                return fallback;
            }
        }
    })();
</script>
</body>
</html>
